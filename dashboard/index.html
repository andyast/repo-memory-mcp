<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Memory Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>Repo Memory</span>
      </div>
      <nav class="nav">
        <a href="#memories" class="nav-item active" data-view="memories">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Memories
        </a>
        <a href="#audit" class="nav-item" data-view="audit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Audit Log
        </a>
        <a href="#stats" class="nav-item" data-view="stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Stats
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="header-content">
          <h1 id="pageTitle">Memories</h1>
          <div class="project-badge" id="projectBadge">
            <span class="dot"></span>
            <span id="projectPath">Loading...</span>
          </div>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search memories...">
          </div>
        </div>
      </header>

      <div class="content">
        <!-- Stats Overview -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-value" id="totalMemories">-</div>
            <div class="stat-label">Total Memories</div>
          </div>
          <div class="stat-card status-active">
            <div class="stat-value" id="activeCount">-</div>
            <div class="stat-label">Active</div>
          </div>
          <div class="stat-card status-warning">
            <div class="stat-value" id="needsRevalidationCount">-</div>
            <div class="stat-label">Needs Revalidation</div>
          </div>
          <div class="stat-card status-danger">
            <div class="stat-value" id="staleCount">-</div>
            <div class="stat-label">Stale</div>
          </div>
        </div>

        <!-- Review Queue -->
        <section class="review-queue" id="reviewQueue" aria-label="Needs attention"></section>

        <!-- Filters -->
        <div class="filters" id="filters" aria-label="Memory status filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="proposed">Proposed</button>
          <button class="filter-btn" data-filter="needs-revalidation">Needs Revalidation</button>
          <button class="filter-btn" data-filter="stale">Stale</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="rejected">Rejected</button>
          <button class="filter-btn" data-filter="probably-active">Probably Active</button>
          <button class="filter-btn" data-filter="superseded">Superseded</button>
          <button class="filter-btn" data-filter="historical">Historical</button>
        </div>

        <!-- Memories Grid -->
        <div class="memories-grid" id="memoriesGrid"></div>

        <!-- Audit Log -->
        <div class="audit-list" id="auditList" style="display: none;"></div>

        <!-- Stats Details -->
        <div class="stats-details" id="statsDetails" style="display: none;"></div>

        <!-- Loading State -->
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Loading memories...</p>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>No memories found</h3>
          <p>Start building by running `repo-memory init` in your project.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Memory Detail Modal -->
  <div class="modal" id="memoryModal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
